name: Bug report
description: Report a defect in any agent-memory package
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - agent-memory-sync
        - memory-digest-cli
        - memory-router
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal commands or code that trigger the bug.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.x.y"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.x"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11"
