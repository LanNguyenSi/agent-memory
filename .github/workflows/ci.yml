name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# This repo is a loose collection of independent npm packages under
# `packages/*` — no root package.json, no npm workspaces. The matrix
# runs one job per package so a failure in one doesn't mask the
# others, and each package is installed/built/tested in isolation.
jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - agent-memory-sync
          - ice-reflection-engine
          - lava-sprint-timer
          - memory-digest-cli
          - memory-router
          - mw-cli
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install
        # `npm ci` when a lockfile exists, fall back to `npm install`
        # for packages that haven't been locked yet (mw-cli).
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # Native-dep smoke: fail fast on CI when a native addon's ABI doesn't
      # match this runner's Node. memory-router ships better-sqlite3 +
      # sqlite-vec; a missing binding would otherwise show up as an opaque
      # test failure later. Cheap no-op for pure-JS packages.
      - name: Native-dep smoke
        run: |
          if [ "${{ matrix.package }}" = "memory-router" ]; then
            node -e "const s = require('sqlite-vec'); const D = require('better-sqlite3'); const db = new D(':memory:'); s.load(db); console.log('native deps OK');"
          fi

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present
